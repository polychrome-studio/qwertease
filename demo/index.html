<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QWERTease demo</title>
<style>
  :root {
    --bg: #0b0b0c;
    --ink: #e8e8e4;
    --dim: #6f6f6a;
    --cursor: #e8e8e4;
    --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Space Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2.5rem;
    padding: 2rem;
  }
  .block {
    width: min(90vw, 620px);
  }
  .line {
    font-size: clamp(1.1rem, 3.4vw, 1.7rem);
    line-height: 1.6;
    min-height: 1.7em;
  }
  .qwertease-cursor {
    display: inline-block;
    width: 0.5em;
    height: 1em;
    background: var(--cursor);
    vertical-align: -0.15em;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    color: var(--dim);
    margin-bottom: 0.6rem;
  }
</style>
</head>
<body>

  <div class="block">
    <div class="label">no mistakes</div>
    <div class="line" id="line1"></div>
  </div>

  <div class="block">
    <div class="label">mistakes on</div>
    <div class="line" id="line2"></div>
  </div>

  <script src="../src/qwertease.js"></script>
  <script>
    var el1 = document.getElementById('line1');
    var el2 = document.getElementById('line2');

    async function run() {
      var q1 = new QWERTease(el1, { speed: 80 });
      var q2 = new QWERTease(el2, { speed: 80, mistakes: true, mistakeRate: 0.09 });
      await Promise.all([
        q1.type('the quick brown fox jumps over the lazy dog'),
        q2.type('the quick brown fox jumps over the lazy dog')
      ]);
    }

    run();
  </script>
</body>
</html>
